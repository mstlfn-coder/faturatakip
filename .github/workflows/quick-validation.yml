name: Quick Validation

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: quick-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Encoding, build and self-test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run quick validation
        shell: cmd
        run: HizliDogrulama.bat
